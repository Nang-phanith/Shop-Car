<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>
    <link rel="Icon" href="https://cdn.vectorstock.com/i/500p/21/82/phone-call-icon-contact-symbol-vector-37642182.jpg">
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#5e625e;
        }

        .contact-box{
            width:400px;
            margin:50px auto;
            background:rgb(233, 234, 235);
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#333;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:1px solid #a55050;
            border-radius:5px;
            
        }

        button{
            width:100%;
            padding:10px;
            background:#1682ed;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }
    </style>
</head>
<body>

<div class="contact-box">
    <h2>Contact Us</h2>

    <form>
        <input type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Email Address" required>

        
        <input type="text" placeholder="Your message" required>
       

        <button type="submit">Send Message</button>
    </form>
</div>

</body>
</html>
